apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # Argo generates a unique name for each submission: benchmark-xxxxx
  generateName: benchmark-
spec:
  # Entry point — Argo starts here
  entrypoint: main-dag
  serviceAccountName: argo-workflows
  templates:

    # ── DAG: defines which tasks to run and in what order ─────────────────────
    - name: main-dag
      dag:
        tasks:
          - name: train-gpu-labatt-2
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_heads_label_attention
                  value: "2"

          - name: train-gpu-labatt-4
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_heads_label_attention
                  value: "4"

          - name: train-gpu-labatt-8
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_heads_label_attention
                  value: "8"

    # ── GPU Trainer template ──────────────────────────────────────────────────
    # 3 GPUs in parallel, one per n_heads_label_attention value
    # each GPU sweeps n_head in {4, 8} x batch_size in {64, 128} → 4 runs per GPU, 12 total
    - name: trainer-gpu
      inputs:
        parameters:
          - name: n_heads_label_attention
      script:
        image: "inseefrlab/onyxia-vscode-pytorch:py3.13.12-gpu"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        source: |
          set -e
          git clone -b main https://github.com/julber95/insee_internship.git
          cd insee_internship

          # n_layers=6, lr=0.00001, n_heads_label_attention fixed per GPU
          # sweep n_head in {4, 8} via bash loop (keeps n_kv_head=n_head)
          # sweep batch_size in {64, 128} via Hydra multirun
          for n_head in 4 8; do
            uv run python -m benchmark.train \
              dataset=amazon \
              tokenizer=wordpiece \
              model.embedding_dim=256 \
              model.n_layers=6 \
              model.n_head=$n_head \
              model.n_kv_head=$n_head \
              model.n_heads_label_attention={{inputs.parameters.n_heads_label_attention}} \
              tokenizer.vocab_size=10000 \
              training.batch_size=64,128 \
              training.lr=0.00001 \
              training.num_epochs=50 \
              training.patience_early_stopping=5 \
              tokenizer.output_dim=256 \
              experiment_name=amazon_opti \
              -m
          done
        resources:
          limits:
            nvidia.com/gpu: "1"
            cpu: "4000m"
            memory: "72Gi"
          requests:
            nvidia.com/gpu: "1"
            cpu: "2000m"
            memory: "36Gi"
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom: { secretKeyRef: { name: vscode-pytorch-202038-secretmlflow, key: MLFLOW_TRACKING_URI } }
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom: { secretKeyRef: { name: vscode-pytorch-202038-secretmlflow, key: MLFLOW_TRACKING_USERNAME } }
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom: { secretKeyRef: { name: vscode-pytorch-202038-secretmlflow, key: MLFLOW_TRACKING_PASSWORD } }
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom: { secretKeyRef: { name: vscode-pytorch-202038-secretmlflow, key: MLFLOW_S3_ENDPOINT_URL } }
          - name: MLFLOW_HTTP_REQUEST_TIMEOUT
            value: "1800"