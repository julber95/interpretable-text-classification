model_name: wordpiece_transformer

datasets:
  sst2:  # sentiment | short texts | 2 classes
    hf_path: stanfordnlp/sst2
    text_col: sentence
    label_col: label
    class_names: [negative, positive]
    train_split: train
    test_split: validation  # test split has no labels in GLUE
    train_size: 50000
    val_size: 2000

  imdb:  # sentiment | long texts | 2 classes
    hf_path: stanfordnlp/imdb
    text_col: text
    label_col: label
    class_names: [negative, positive]
    train_split: train
    test_split: test
    train_size: 20000
    val_size: 2000
    test_size: 5000

  amazon:  # sentiment | medium texts | 5 classes | categorical (product category)
    hf_path: goosmanlei/amazon_reviews_multi
    text_col: review_body
    title_col: review_title
    label_col: stars
    label_offset: -1
    class_names: ["1star", "2stars", "3stars", "4stars", "5stars"]
    train_split: train
    test_split: test
    train_size: 50000
    val_size: 2000
    test_size: 5000
    hf_config: en
    categorical_cols:
      product_category: null

  ag_news:  # topic | short texts | 4 classes
    hf_path: fancyzhx/ag_news
    text_col: text
    label_col: label
    class_names: [World, Sports, Business, Sci/Tech]
    train_split: train
    test_split: test
    train_size: 50000
    val_size: 2000
    test_size: 5000

  20newsgroups:  # topic | very long texts | 20 classes
    hf_path: SetFit/20_newsgroups
    text_col: text
    label_col: label
    class_names: [alt.atheism, comp.graphics, comp.os.ms-windows.misc, comp.sys.ibm.pc.hardware,
                  comp.sys.mac.hardware, comp.windows.x, misc.forsale, rec.autos, rec.motorcycles,
                  rec.sport.baseball, rec.sport.hockey, sci.crypt, sci.electronics, sci.med,
                  sci.space, soc.religion.christian, talk.politics.guns, talk.politics.mideast,
                  talk.politics.misc, talk.religion.misc]
    train_split: train
    test_split: test
    train_size: 9000
    val_size: 1000
    test_size: 5000

  subj:  # subjectivity | short texts | 2 classes | small dataset
    hf_path: SetFit/subj
    text_col: text
    label_col: label
    class_names: [objective, subjective]
    train_split: train
    test_split: test
    train_size: 6000
    val_size: 2000
    test_size: 2000

  clinc150:  # intent detection | short texts | 150 classes + out-of-scope
    hf_path: DeepPavlov/clinc150
    text_col: utterance
    label_col: label
    train_split: train
    test_split: test
    train_size: 13000
    val_size: 2000
    test_size: 3000
    oos_label: 150

tokenizer:
  type: wordpiece
  vocab_size: 10000
  output_dim: 128

model:
  embedding_dim: 128
  aggregation_method: mean
  attention_config:
    n_layers: 2
    n_head: 4
    n_kv_head: 4
    positional_encoding: true
    sequence_len: 128

training:
  num_epochs: 10
  batch_size: 64
  lr: 0.001
  patience_early_stopping: 3
  num_workers: 0

seed: 42
