apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # Argo generates a unique name for each submission: benchmark-xxxxx
  generateName: benchmark-
spec:
  # Entry point — Argo starts here
  entrypoint: main-dag
  serviceAccountName: argo-workflows
  templates:

    # ── DAG: defines which tasks to run and in what order ─────────────────────
    - name: main-dag
      dag:
        tasks:
          - name: train-gpu-1
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "64"

          - name: train-gpu-2
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "128"

          - name: train-gpu-3
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "256"

          - name: train-gpu-4
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "512"

    # ── GPU Trainer template ──────────────────────────────────────────────────
    - name: trainer-gpu
      inputs:
        parameters:
          - name: emb_dims
      script:
        image: "inseefrlab/onyxia-vscode-pytorch:py3.13.12-gpu"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        source: |
          set -e
          git clone -b main https://github.com/julber95/insee_internship.git
          cd insee_internship

          # n_layers=0: FastText-style — n_head irrelevant, sweep lr and vocab_size
          uv run python -m benchmark.run \
            dataset=amazon \
            tokenizer=wordpiece \
            model.embedding_dim={{inputs.parameters.emb_dims}} \
            model.n_layers=0 \
            model.n_heads_label_attention=null \
            tokenizer.vocab_size=2000,5000,10000,20000 \
            training.batch_size=128 \
            training.lr=0.0001,0.001,0.0005 \
            training.num_epochs=40 \
            training.patience_early_stopping=5 \
            -m

          # n_layers=1,2: sweep n_head (n_kv_head=n_head), label attention, lr and vocab_size
          # n_kv_head is always set equal to n_head to satisfy the GQA constraint
          for n_head in 2 4 8; do
            uv run python -m benchmark.run \
              dataset=amazon \
              tokenizer=wordpiece \
              model.embedding_dim={{inputs.parameters.emb_dims}} \
              model.n_layers=1,2 \
              model.n_head=$n_head \
              model.n_kv_head=$n_head \
              model.n_heads_label_attention=null,4 \
              tokenizer.vocab_size=2000,5000,10000,20000 \
              training.batch_size=128 \
              training.lr=0.0001,0.001,0.0005 \
              training.num_epochs=40 \
              training.patience_early_stopping=5 \
              -m
          done
        resources:
          limits:
            nvidia.com/gpu: "1"
            cpu: "4000m"
            memory: "72Gi"
          requests:
            nvidia.com/gpu: "1"
            cpu: "2000m"
            memory: "36Gi"
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_URI } }
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_USERNAME } }
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_PASSWORD } }
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_S3_ENDPOINT_URL } }
          - name: MLFLOW_HTTP_REQUEST_TIMEOUT
            value: "1800"