apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # Argo generates a unique name for each submission: benchmark-xxxxx
  generateName: benchmark-
spec:
  # Entry point — Argo starts here
  entrypoint: main-dag
  serviceAccountName: argo-workflows
  templates:

    # ── DAG: defines which tasks to run and in what order ─────────────────────
    - name: main-dag
      dag:
        tasks:
          - name: train-gpu-L6
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_layers
                  value: "6"

          - name: train-gpu-L8
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_layers
                  value: "8"

          - name: train-gpu-L10
            template: trainer-gpu
            arguments:
              parameters:
                - name: n_layers
                  value: "10"

    # ── GPU Trainer template ──────────────────────────────────────────────────
    - name: trainer-gpu
      inputs:
        parameters:
          - name: n_layers
      script:
        image: "inseefrlab/onyxia-vscode-pytorch:py3.13.12-gpu"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        source: |
          set -e
          git clone -b main https://github.com/julber95/insee_internship.git
          cd insee_internship

          # emb_dim=256, vocab_size=10000, lr=0.0001 fixed
          # sweep n_head — scheduler ReduceLROnPlateau configured in run.py
          for n_head in 2 4 8 16; do
            uv run python -m benchmark.run \
              dataset=amazon \
              tokenizer=wordpiece \
              model.embedding_dim=256 \
              model.n_layers={{inputs.parameters.n_layers}} \
              model.n_head=$n_head \
              model.n_kv_head=$n_head \
              model.n_heads_label_attention=null \
              tokenizer.vocab_size=10000 \
              training.batch_size=64,128 \
              training.lr=0.0001,0.00005 \
              training.num_epochs=50 \
              training.patience_early_stopping=5 \
              tokenizer.output_dim=256 \
              experiment_name=amazon_opti \
              -m
          done
        resources:
          limits:
            nvidia.com/gpu: "1"
            cpu: "4000m"
            memory: "72Gi"
          requests:
            nvidia.com/gpu: "1"
            cpu: "2000m"
            memory: "36Gi"
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_URI } }
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_USERNAME } }
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_PASSWORD } }
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_S3_ENDPOINT_URL } }
          - name: MLFLOW_HTTP_REQUEST_TIMEOUT
            value: "1800"