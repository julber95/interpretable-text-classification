apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # Argo generates a unique name for each submission: benchmark-xxxxx
  generateName: benchmark-
spec:
  # Entry point — Argo starts here
  entrypoint: main-dag
  serviceAccountName: argo-workflows
  templates:

    # ── DAG: defines which tasks to run and in what order ─────────────────────
    - name: main-dag
      dag:
        tasks:
          - name: train-gpu-1
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "32"

          - name: train-gpu-2
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "64"

          - name: train-gpu-3
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "128"

          - name: train-gpu-4
            template: trainer-gpu
            arguments:
              parameters:
                - name: emb_dims
                  value: "256"

    # ── GPU Trainer template ──────────────────────────────────────────────────
    - name: trainer-gpu
      inputs:
        parameters:
          - name: emb_dims
      script:
        image: "inseefrlab/onyxia-vscode-pytorch:py3.13.12-gpu"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        source: |
          set -e
          git clone -b main https://github.com/julber95/insee_internship.git
          cd insee_internship

          # n_layers=0: no label attention
          uv run python -m benchmark.run \
            dataset=imdb \
            tokenizer=ngram,wordpiece \
            model.embedding_dim={{inputs.parameters.emb_dims}} \
            model.n_layers=0 \
            model.n_heads_label_attention=null \
            training.batch_size=32 \
            -m

          # n_layers=1,2: with or without label attention
          uv run python -m benchmark.run \
            dataset=imdb \
            tokenizer=ngram,wordpiece \
            model.embedding_dim={{inputs.parameters.emb_dims}} \
            model.n_layers=1,2 \
            model.n_heads_label_attention=null,4 \
            training.batch_size=32 \
            -m
        resources:
          limits:
            nvidia.com/gpu: "1"
            cpu: "4000m"
            memory: "72Gi"
          requests:
            nvidia.com/gpu: "1"
            cpu: "2000m"
            memory: "36Gi"
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom: { secretKeyRef: { name: vscode-pytorch-321556-secretmlflow, key: MLFLOW_TRACKING_URI } }
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom: { secretKeyRef: { name: vscode-pytorch-321556-secretmlflow, key: MLFLOW_TRACKING_USERNAME } }
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom: { secretKeyRef: { name: vscode-pytorch-321556-secretmlflow, key: MLFLOW_TRACKING_PASSWORD } }
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom: { secretKeyRef: { name: vscode-pytorch-321556-secretmlflow, key: MLFLOW_S3_ENDPOINT_URL } }
          - name: MLFLOW_HTTP_REQUEST_TIMEOUT
            value: "1800"