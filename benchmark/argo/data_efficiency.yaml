apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: data-efficiency-
spec:
  entrypoint: main-dag
  serviceAccountName: argo-workflows
  templates:

    # ── DAG: 3 GPUs en parallèle, un par lr ───────────────────────────────────
    - name: main-dag
      dag:
        tasks:
          - name: lr-1e-5
            template: trainer-gpu
            arguments:
              parameters:
                - name: lr
                  value: "0.00001"

          - name: lr-1e-4
            template: trainer-gpu
            arguments:
              parameters:
                - name: lr
                  value: "0.0001"

          - name: lr-1e-3
            template: trainer-gpu
            arguments:
              parameters:
                - name: lr
                  value: "0.001"

    # ── GPU Trainer template ──────────────────────────────────────────────────
    - name: trainer-gpu
      inputs:
        parameters:
          - name: lr
      script:
        image: "inseefrlab/onyxia-vscode-pytorch:py3.13.12-gpu"
        imagePullPolicy: Always
        command: ["/bin/bash"]
        source: |
          set -e
          git clone -b main https://github.com/julber95/insee_internship.git
          cd insee_internship

          for fraction in 0.1 0.2 0.5 1.0; do

            # FastText
            uv run python -m benchmark.run \
              dataset=amazon tokenizer=wordpiece \
              model.embedding_dim=256 model.n_layers=0 \
              model.n_head=null model.n_kv_head=null \
              model.n_heads_label_attention=null \
              tokenizer.vocab_size=10000 \
              training.batch_size=128 training.lr={{inputs.parameters.lr}} \
              training.num_epochs=40 training.patience_early_stopping=5 \
              train_fraction=$fraction experiment_name=amazon_train_eff -m

            # Transformer L=1
            uv run python -m benchmark.run \
              dataset=amazon tokenizer=wordpiece \
              model.embedding_dim=256 model.n_layers=1 \
              model.n_head=4 model.n_kv_head=4 \
              model.n_heads_label_attention=null \
              tokenizer.vocab_size=10000 \
              training.batch_size=128 training.lr={{inputs.parameters.lr}} \
              training.num_epochs=40 training.patience_early_stopping=5 \
              train_fraction=$fraction experiment_name=amazon_train_eff -m

            # Transformer L=2
            uv run python -m benchmark.run \
              dataset=amazon tokenizer=wordpiece \
              model.embedding_dim=256 model.n_layers=2 \
              model.n_head=4 model.n_kv_head=4 \
              model.n_heads_label_attention=null \
              tokenizer.vocab_size=10000 \
              training.batch_size=128 training.lr={{inputs.parameters.lr}} \
              training.num_epochs=40 training.patience_early_stopping=5 \
              train_fraction=$fraction experiment_name=amazon_train_eff -m

            # Label Attention
            uv run python -m benchmark.run \
              dataset=amazon tokenizer=wordpiece \
              model.embedding_dim=256 model.n_layers=1 \
              model.n_head=4 model.n_kv_head=4 \
              model.n_heads_label_attention=4 \
              tokenizer.vocab_size=10000 \
              training.batch_size=128 training.lr={{inputs.parameters.lr}} \
              training.num_epochs=40 training.patience_early_stopping=5 \
              train_fraction=$fraction experiment_name=amazon_train_eff -m

          done
        resources:
          limits:
            nvidia.com/gpu: "1"
            cpu: "4000m"
            memory: "72Gi"
          requests:
            nvidia.com/gpu: "1"
            cpu: "2000m"
            memory: "36Gi"
        env:
          - name: MLFLOW_TRACKING_URI
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_URI } }
          - name: MLFLOW_TRACKING_USERNAME
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_USERNAME } }
          - name: MLFLOW_TRACKING_PASSWORD
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_TRACKING_PASSWORD } }
          - name: MLFLOW_S3_ENDPOINT_URL
            valueFrom: { secretKeyRef: { name: vscode-pytorch-gpu-43156-secretmlflow, key: MLFLOW_S3_ENDPOINT_URL } }
          - name: MLFLOW_HTTP_REQUEST_TIMEOUT
            value: "1800"
